name: CI + Allure Report

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# NEW: needed to allow the workflow to publish to GitHub Pages
permissions:
  contents: write

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      # NEW: Allure needs Java to generate the HTML report
      - name: Set up Java (for Allure CLI)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      # NEW: install the Allure command-line tool
      - name: Install Allure CLI
        run: |
          curl -o allure.tgz -L https://github.com/allure-framework/allure2/releases/download/2.27.0/allure-2.27.0.tgz
          tar -zxvf allure.tgz
          sudo mv allure-2.27.0 /opt/allure
          sudo ln -s /opt/allure/bin/allure /usr/local/bin/allure

      - name: Lint with flake8
        run: flake8 stats/ tests/ --max-line-length=100

      # UPDATED: --alluredir saves raw results that Allure CLI will process
      - name: Run tests with coverage + Allure results
        run: |
          pytest tests/ \
            --cov=stats \
            --cov-report=term-missing \
            --cov-fail-under=80 \
            --alluredir=allure-results

      # NEW: turn raw results into a full HTML report
      - name: Generate Allure HTML report
        run: allure generate allure-results --clean -o allure-report

      # NEW: publish the report to GitHub Pages
      - name: Deploy report to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        if: github.ref == 'refs/heads/main'   # only deploy on main, not PRs
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./allure-report