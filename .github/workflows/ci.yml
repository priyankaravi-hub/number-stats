name: CI

# Run on every push and pull request to main
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest   # GitHub spins up a fresh Ubuntu VM for you

    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]   # test on 3 versions at once

    steps:
      # 1. Check out your code onto the VM
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. Install Python (the version from the matrix above)
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      # 3. Install your dependencies
      - name: Install dependencies
        run: pip install -r requirements.txt

      # 4. Lint — fail the build if code style is bad
      - name: Lint with flake8
        run: flake8 stats/ tests/ --max-line-length=100

      # 5. Run tests with coverage
      - name: Run tests with coverage
        run: pytest tests/ --cov=stats --cov-report=term-missing

      # 6. Fail the build if coverage drops below 80%
      - name: Enforce coverage threshold
        run: pytest tests/ --cov=stats --cov-fail-under=80
